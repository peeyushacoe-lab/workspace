<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1a56db"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="480" fill="#ffffff"/>

  <!-- ICON MARK -->
  <g transform="translate(90,90)">
    <!-- Hexagonal shield frame -->
    <path d="M150 4
             L272 74
             A16 16 0 0 1 280 88
             L280 216
             C280 260 224 292 150 296
             C76 292 20 260 20 216
             L20 88
             A16 16 0 0 1 28 74
             Z"
          fill="none" stroke="url(#markGrad)" stroke-width="13" stroke-linejoin="round"/>

    <!-- Nexus "N" formed from three linked nodes -->
    <!-- left bar -->
    <rect x="82" y="96" width="26" height="140" rx="13" fill="#1a56db"/>
    <!-- right bar -->
    <rect x="192" y="96" width="26" height="140" rx="13" fill="#1a56db"/>
    <!-- diagonal connector -->
    <path d="M95 108 L205 224" stroke="#1a56db" stroke-width="26" stroke-linecap="round"/>

    <!-- node terminals (network points) -->
    <circle cx="95" cy="100" r="20" fill="#ffffff" stroke="#1a56db" stroke-width="13"/>
    <circle cx="205" cy="100" r="20" fill="#1a56db"/>
    <circle cx="95" cy="232" r="20" fill="#1a56db"/>
    <circle cx="205" cy="232" r="20" fill="#ffffff" stroke="#1a56db" stroke-width="13"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(430,0)">
    <text x="0" y="240" font-family="Helvetica, Arial, sans-serif" font-size="108" font-weight="700" letter-spacing="1" fill="#202124">NEXUS</text>
    <text x="4" y="285" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="500" letter-spacing="6" fill="#5f6368">CYBERSAGE</text>
  </g>
</svg>

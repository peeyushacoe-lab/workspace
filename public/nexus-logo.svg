  <circle cx="42" cy="12" r="2" fill="#00d2ff" filter="url(#glow)"/>
  <circle cx="42" cy="36" r="2" fill="#00d2ff" filter="url(#glow)"/>
  <circle cx="24" cy="46" r="2" fill="#00d2ff" filter="url(#glow)"/>
  <circle cx="6"  cy="36" r="2" fill="#00d2ff" filter="url(#glow)"/>
  <circle cx="6"  cy="12" r="2" fill="#00d2ff" filter="url(#glow)"/>
  <!-- N letterform -->
  <path d="M15 33 L15 15 L20 15 L29 27 L29 15 L33 15 L33 33 L28 33 L19 21 L19 33 Z"
        fill="url(#g1)" filter="url(#glow)"/>
